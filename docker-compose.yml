version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - qdrant
      - neo4j
      - redis
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    volumes:
      - ./:/app
    depends_on:
      - redis
    env_file:
      - .env
    command: celery -A api.worker.celery_app worker --loglevel=info

volumes:
  qdrant_data:
  neo4j_data:
