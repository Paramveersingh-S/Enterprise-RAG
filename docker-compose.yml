version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - lexrag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: lexrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/lexragpassword
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lexrag-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "lexragpassword", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexrag-redis
    ports:
      - "6379:6379"
    networks:
      - lexrag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: lexrag-phoenix
    ports:
      - "6006:6006"
    networks:
      - lexrag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lexrag-network:
    driver: bridge

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
